    // ═══════════════════════════════════════════════════════════════
    // ENHANCED CURSOR WITH TRAIL
    // ═══════════════════════════════════════════════════════════════
    const initCursor=()=>{
      if(window.innerWidth<1024)return;
      const ring=document.getElementById('cursor-ring');
      const dot=document.getElementById('cursor-dot');
      const trailsContainer=document.getElementById('cursor-trails');
      if(!ring||!dot)return;
      
      let mouseX=0,mouseY=0,ringX=0,ringY=0;
      const trails=[];
      const trailCount=5;
      
      // Create trail elements
      for(let i=0;i<trailCount;i++){
        const trail=document.createElement('div');
        trail.className='cursor-trail';
        trail.style.opacity=(1-i/trailCount)*0.5;
        trail.style.width=(8-i)+'px';
        trail.style.height=(8-i)+'px';
        trailsContainer.appendChild(trail);
        trails.push({el:trail,x:0,y:0});
      }
      
      document.addEventListener('mousemove',e=>{
        mouseX=e.clientX;
        mouseY=e.clientY;
        dot.style.left=mouseX-4+'px';
        dot.style.top=mouseY-4+'px';
      });
      
      document.addEventListener('mousedown',()=>ring.classList.add('clicking'));
      document.addEventListener('mouseup',()=>ring.classList.remove('clicking'));
      
      const animate=()=>{
        // Smooth ring follow
        ringX+=(mouseX-ringX)*0.12;
        ringY+=(mouseY-ringY)*0.12;
        ring.style.left=ringX-20+'px';
        ring.style.top=ringY-20+'px';
        
        // Trail effect
        let prevX=mouseX,prevY=mouseY;
        trails.forEach((t,i)=>{
          const speed=0.3-i*0.04;
          t.x+=(prevX-t.x)*speed;
          t.y+=(prevY-t.y)*speed;
          t.el.style.left=t.x-3+'px';
          t.el.style.top=t.y-3+'px';
          prevX=t.x;
          prevY=t.y;
        });
        
        requestAnimationFrame(animate);
      };
      animate();
      
      const addHover=()=>{
        document.querySelectorAll('a,button,[data-hover]').forEach(el=>{
          el.addEventListener('mouseenter',()=>ring.classList.add('hover'));
          el.addEventListener('mouseleave',()=>ring.classList.remove('hover'));
        });
      };
      addHover();
      setInterval(addHover,2000);
    };

    // ═══════════════════════════════════════════════════════════════
    // INTERACTIVE DOT PATTERN BACKGROUND (Hero Only)
    // ═══════════════════════════════════════════════════════════════
    const HeroBackground=()=>{
      const canvasRef=useRef(null);
      const mouseRef=useRef({x:0,y:0});
      
      useEffect(()=>{
        const canvas=canvasRef.current;
        const ctx=canvas.getContext('2d');
        let animationId;
        let particles=[];
        
        const resize=()=>{
          const parent=canvas.parentElement;
          canvas.width=parent.offsetWidth;
          canvas.height=parent.offsetHeight;
          initParticles();
        };
        
        const initParticles=()=>{
          particles=[];
          const numParticles=150;
          for(let i=0;i<numParticles;i++){
            particles.push({
              x:Math.random()*canvas.width,
              y:Math.random()*canvas.height,
              vx:(Math.random()-0.5)*0.5,
              vy:(Math.random()-0.5)*0.5,
              radius:Math.random()*2.5+1,
              color:Math.random()>0.5?'#60a5fa':'#fbbf24'
            });
          }
        };
        
        const handleMouseMove=(e)=>{
          const rect=canvas.getBoundingClientRect();
          mouseRef.current={x:e.clientX-rect.left,y:e.clientY-rect.top};
        };
        
        const animate=()=>{
          ctx.fillStyle='rgba(0,0,0,0.05)';
          ctx.fillRect(0,0,canvas.width,canvas.height);
          
          particles.forEach(p=>{
            p.x+=p.vx;
            p.y+=p.vy;
            
            if(p.x<0||p.x>canvas.width)p.vx*=-1;
            if(p.y<0||p.y>canvas.height)p.vy*=-1;
            
            const dx=mouseRef.current.x-p.x;
            const dy=mouseRef.current.y-p.y;
            const dist=Math.sqrt(dx*dx+dy*dy);
            if(dist<120){
              p.x-=dx*0.02;
              p.y-=dy*0.02;
            }
            
            ctx.beginPath();
            ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
            ctx.fillStyle=p.color;
            ctx.fill();
            
            particles.forEach(p2=>{
              const dx2=p.x-p2.x;
              const dy2=p.y-p2.y;
              const dist2=Math.sqrt(dx2*dx2+dy2*dy2);
              if(dist2<100){
                ctx.beginPath();
                ctx.moveTo(p.x,p.y);
                ctx.lineTo(p2.x,p2.y);
                ctx.strokeStyle=p.color==='#60a5fa'?'rgba(96,165,250,0.15)':'rgba(251,191,36,0.15)';
                ctx.lineWidth=0.5;
                ctx.stroke();
              }
            });
          });
          
          animationId=requestAnimationFrame(animate);
        };
        
        resize();
        animate();
        
        window.addEventListener('resize',resize);
        canvas.addEventListener('mousemove',handleMouseMove);
        
        return()=>{
          cancelAnimationFrame(animationId);
          window.removeEventListener('resize',resize);
          canvas.removeEventListener('mousemove',handleMouseMove);
        };
      },[]);
      
      return(
        <canvas
          ref={canvasRef}
          style={{
            position:'absolute',
            top:0,
            left:0,
            width:'100%',
            height:'100%',
            pointerEvents:'auto',
            zIndex:1
          }}
        />
      );
    };

              'Accept': 'application/json'

              company: form.company,

              _subject: `Free Audit Request from ${form.name} - ${form.company}`,

                value: form.company

                          strokeDasharray="5,5"
                        />
                      </svg>
                    )}
                    
                    {/* Content Card */}
                    <div 
                      style={{
                        maxWidth:520,
                        background:isHovered?'rgba(163,230,53,0.03)':'rgba(255,255,255,0.02)',
                        border:`2px solid ${isHovered?step.color:'rgba(255,255,255,0.06)'}`,
                        borderRadius:24,
                        padding:'2rem',
                        display:'flex',
                        alignItems:'center',
                        gap:'1.5rem',
                        transition:'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)',
                        transform:isHovered?'translateY(-8px) scale(1.02)':'translateY(0) scale(1)',
                        boxShadow:isHovered?`0 20px 60px ${step.color}40`:'0 10px 30px rgba(0,0,0,0.3)',
                        position:'relative',
                        zIndex:isHovered?10:1
                      }}
                    >
                      {/* Icon Circle */}
                      <div style={{
                        minWidth:90,
                        height:90,
                        background:isHovered?`linear-gradient(135deg, ${step.color}, ${i%2===0?'#8b5cf6':'#a3e635'})`:step.color,
                        borderRadius:'50%',
                        display:'flex',
                        flexDirection:'column',
                        alignItems:'center',
                        justifyContent:'center',
                        fontSize:'2rem',
                        fontWeight:700,
                        color:'#000',
                        transition:'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)',
                        boxShadow:isHovered?`0 15px 50px ${step.color}60`:`0 8px 25px ${step.color}30`,
                        position:'relative'
                      }}>
                        {/* Glow effect */}
                        {isHovered&&(
                          <div style={{
                            position:'absolute',
                            inset:-15,
                            background:`radial-gradient(circle, ${step.color}30 0%, transparent 70%)`,
                            borderRadius:'50%',
                            zIndex:-1,
                            animation:'pulse-glow 2s infinite'
                          }}/>
                        )}
                        <div style={{fontSize:'2rem',marginBottom:'-0.3rem'}}>{step.icon}</div>
                        <div style={{fontSize:'0.7rem',fontWeight:700,color:isHovered?'#fff':'#000',marginTop:'-0.2rem'}}>{step.num}</div>
                      </div>
                      
                      {/* Text Content */}
                      <div style={{flex:1}}>
                        <h3 style={{
                          fontSize:'1.1rem',
                          fontWeight:600,
                          marginBottom:'0.75rem',
                          color:isHovered?step.color:'#fff',
                          transition:'color 0.3s',
                          letterSpacing:'0.02em'
                        }}>{step.title}</h3>
                        
                        <p style={{
                          color:isHovered?'#d4d4d8':'#a1a1aa',
                          fontSize:'0.85rem',
                          lineHeight:1.7,
                          transition:'color 0.3s'
                        }}>{step.copy}</p>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </section>
      );
    };

      <footer style={{padding:'3rem 1.5rem 1.5rem',borderTop:'1px solid rgba(255,255,255,0.05)',position:'relative',zIndex:10,background:'#000'}}>

    // ═══════════════════════════════════════════════════════════════
    // MAIN APP
    // ═══════════════════════════════════════════════════════════════
    const App=()=>{
      const[lang,setLang]=useState('en');
      
      useEffect(()=>{
        const params=new URLSearchParams(window.location.search);
        const urlLang=params.get('lang');
        if(urlLang&&['en','es'].includes(urlLang))setLang(urlLang);
        else{
          const saved=localStorage.getItem('faralai-lang');
          if(saved)setLang(saved);
          else setLang(navigator.language?.startsWith('es')?'es':'en');
        }
        setTimeout(()=>initCursor(),200);
      },[]);
      
      useEffect(()=>{
        localStorage.setItem('faralai-lang',lang);
        document.documentElement.lang=lang;
        document.title=lang==='es'?'Faralai — Marketing con IA e Inteligencia de Crecimiento':'Faralai — AI Marketing & Growth Intelligence';
      },[lang]);
      
      const t=translations[lang];
      
      return(
        <div style={{position:'relative',background:'#000'}}>
          <Navigation lang={lang} setLang={setLang} t={t}/>
          <Hero t={t}/>
          <AuditForm t={t}/>
          <Services t={t}/>
          <Process t={t}/>
          <Pricing t={t}/>
          <About t={t}/>
          <CTA t={t}/>
          <LogoCarousel t={t}/>
          <Footer t={t}/>
        </div>
      );
    };
    
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
